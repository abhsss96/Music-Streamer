<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a8a" />
    </marker>
  </defs>

  <rect width="900" height="900" fill="#ffffff" />

  <!-- Clients -->
  <rect x="320" y="20" width="260" height="70" rx="10" fill="#f2ede4" stroke="#8a7f6a" stroke-width="1.5" />
  <text x="450" y="50" text-anchor="middle" font-size="18" font-weight="bold" fill="#3a3a3a">Clients</text>
  <text x="450" y="72" text-anchor="middle" font-size="13" fill="#5a5a5a">web + mobile</text>

  <!-- Rails on GKE -->
  <rect x="90" y="160" width="320" height="80" rx="10" fill="#d9f2ea" stroke="#159f7a" stroke-width="1.5" />
  <text x="250" y="192" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f6b52">Rails on GKE</text>
  <text x="250" y="214" text-anchor="middle" font-size="13" fill="#0f6b52">control plane &#183; Puma</text>

  <!-- Cloud CDN -->
  <rect x="500" y="160" width="300" height="80" rx="10" fill="#fbe9d0" stroke="#c9821a" stroke-width="1.5" />
  <text x="650" y="192" text-anchor="middle" font-size="17" font-weight="bold" fill="#8a4b0a">Cloud CDN</text>
  <text x="650" y="214" text-anchor="middle" font-size="13" fill="#8a4b0a">audio delivery</text>

  <!-- Cloud SQL (now also Solid Queue / Solid Cache tables) -->
  <rect x="90" y="330" width="320" height="100" rx="10" fill="#d9f2ea" stroke="#159f7a" stroke-width="1.5" />
  <text x="250" y="362" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f6b52">Cloud SQL</text>
  <text x="250" y="384" text-anchor="middle" font-size="13" fill="#0f6b52">Postgres + replicas</text>
  <text x="250" y="404" text-anchor="middle" font-size="12" fill="#0f6b52">+ Solid Queue / Solid Cache tables</text>

  <!-- Cloud Storage -->
  <rect x="500" y="330" width="300" height="80" rx="10" fill="#fbe9d0" stroke="#c9821a" stroke-width="1.5" />
  <text x="650" y="362" text-anchor="middle" font-size="17" font-weight="bold" fill="#8a4b0a">Cloud Storage</text>
  <text x="650" y="384" text-anchor="middle" font-size="13" fill="#8a4b0a">audio files (GCS)</text>

  <!-- Solid Queue worker on GKE -->
  <rect x="90" y="500" width="320" height="80" rx="10" fill="#e9e6fb" stroke="#6a5acd" stroke-width="1.5" />
  <text x="250" y="532" text-anchor="middle" font-size="17" font-weight="bold" fill="#3d2f8f">Solid Queue worker on GKE</text>
  <text x="250" y="554" text-anchor="middle" font-size="13" fill="#3d2f8f">background jobs (no Redis)</text>

  <!-- Pub/Sub -->
  <rect x="90" y="650" width="320" height="80" rx="10" fill="#e9e6fb" stroke="#6a5acd" stroke-width="1.5" />
  <text x="250" y="682" text-anchor="middle" font-size="17" font-weight="bold" fill="#3d2f8f">Pub/Sub</text>
  <text x="250" y="704" text-anchor="middle" font-size="13" fill="#3d2f8f">events &#8594; BigQuery</text>

  <!-- Arrows -->
  <line x1="410" y1="90" x2="280" y2="158" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="500" y1="90" x2="630" y2="158" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />

  <line x1="250" y1="240" x2="250" y2="328" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="650" y1="240" x2="650" y2="328" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />

  <line x1="250" y1="430" x2="250" y2="498" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="250" y1="580" x2="250" y2="648" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Legend -->
  <rect x="90" y="800" width="18" height="18" rx="3" fill="#d9f2ea" stroke="#159f7a" stroke-width="1.5" />
  <text x="118" y="814" font-size="13" fill="#3a3a3a">control plane</text>

  <rect x="260" y="800" width="18" height="18" rx="3" fill="#fbe9d0" stroke="#c9821a" stroke-width="1.5" />
  <text x="288" y="814" font-size="13" fill="#3a3a3a">audio delivery</text>

  <rect x="430" y="800" width="18" height="18" rx="3" fill="#e9e6fb" stroke="#6a5acd" stroke-width="1.5" />
  <text x="458" y="814" font-size="13" fill="#3a3a3a">async processing</text>
</svg>
