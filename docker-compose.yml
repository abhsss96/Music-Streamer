x-app-env: &app-env
  RAILS_ENV: development
  DATABASE_HOST: db
  DATABASE_PORT: "5432"
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_NAME: music_streamer_development
  JWT_SECRET: development-only-secret-do-not-use-in-production
  # Presigning is a local computation (no network round-trip), and the host
  # gets baked into the signature -- so this must be the endpoint whatever
  # fetches the audio (host browser, mobile simulator) can actually reach,
  # not MinIO's internal Docker DNS name.
  S3_ENDPOINT: http://localhost:9000
  S3_REGION: auto
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_AUDIO_BUCKET: audio
  S3_FORCE_PATH_STYLE: "true"
  CORS_ORIGINS: http://localhost:5173

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: music_streamer_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/audio
      "

  web:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
    command: [ "./bin/rails", "server", "-b", "0.0.0.0" ]
    environment:
      <<: *app-env
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
    command: [ "./bin/jobs" ]
    environment:
      <<: *app-env
    volumes:
      - .:/rails
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
